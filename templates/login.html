<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Inventario</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
}

.login-box{
    width:430px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.12);
    border:1px solid #e5e7eb;
}

.logo{
    text-align:center;
    font-size:70px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#1f2937;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#6b7280;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.error{
    background:#fee2e2;
    color:#b91c1c;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:20px;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#9ca3af;
    font-size:13px;
}

</style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        📦
    </div>

    <h1>Sistema de Inventario</h1>

    <p class="subtitulo">
        Control y búsqueda de productos
    </p>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <div class="form-group">
            <label>Usuario</label>
            <input
                type="text"
                name="usuario"
                placeholder="Ingrese su usuario"
                required>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input
                type="password"
                name="password"
                placeholder="Ingrese su contraseña"
                required>
        </div>

        <button type="submit">
            Ingresar al Sistema
        </button>

    </form>

    <div class="footer">
        Programación Aplicada II
    </div>

</div>

</body>
</html>
