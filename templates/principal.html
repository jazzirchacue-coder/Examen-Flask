<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Principal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef2f7;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:600px;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo{
font-size:80px;
margin-bottom:15px;
}

h1{
color:#1f2937;
margin-bottom:10px;
}

.subtitulo{
color:#6b7280;
margin-bottom:30px;
}

.usuario{
background:#f3f4f6;
padding:12px;
border-radius:10px;
margin-bottom:25px;
}

.btn{
display:block;
text-decoration:none;
margin-bottom:15px;
}

.btn button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
color:white;
}

.buscar button{
background:#2563eb;
}

.buscar button:hover{
background:#1d4ed8;
}

.salir button{
background:#dc2626;
}

.salir button:hover{
background:#b91c1c;
}

</style>
</head>
<body>

<div class="card">

<div class="logo">
🛒
</div>

<h1>Sistema de Gestión de Productos</h1>

<p class="subtitulo">
Panel Principal del Sistema
</p>

<div class="usuario">
👤 Bienvenido: <strong>{{ usuario }}</strong>
</div>

<a href="/buscador" class="btn buscar">
<button>
🔍 Buscar Productos
</button>
</a>

<a href="/logout" class="btn salir">
<button>
🚪 Cerrar Sesión
</button>
</a>

</div>

</body>
</html>
