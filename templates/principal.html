<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Principal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef2f7;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:500px;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
color:#1f2937;
margin-bottom:10px;
}

p{
color:#6b7280;
margin-bottom:30px;
}

.btn{
display:block;
text-decoration:none;
margin-bottom:15px;
}

.btn button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
color:white;
}

.buscar button{
background:#2563eb;
}

.salir button{
background:#dc2626;
}

</style>

</head>
<body>

<div class="card">

<h1>Bienvenido</h1>

<p>{{ usuario }}</p>

<a href="/buscador" class="btn buscar">
<button>🔍 Buscar Productos</button>
</a>

<a href="/logout" class="btn salir">
<button>🚪 Cerrar Sesión</button>
</a>

</div>

</body>
</html>
